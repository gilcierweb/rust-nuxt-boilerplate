user                    nginx;
worker_processes        auto;
worker_rlimit_nofile    65535;
error_log               /var/log/nginx/error.log warn;
pid                     /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept         on;
    use                  epoll;
}

http {
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # ----------------------------------------------------------------------
    # Performance & security defaults
    # ----------------------------------------------------------------------
    sendfile                on;
    tcp_nopush              on;
    tcp_nodelay             on;
    keepalive_timeout       65;
    types_hash_max_size     2048;
    server_tokens           off;                              # Hide version
    client_max_body_size    100m;                             # Allow large uploads
    client_body_timeout     60s;
    client_header_timeout   60s;

    # Proxy buffers (avoid disk-based buffering for typical API payloads)
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;
    proxy_temp_path         /var/cache/nginx/proxy_temp;
    proxy_connect_timeout   5s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # FastCGI (unused, prevents default)
    fastcgi_buffers         8 16k;

    # Logging — omit requests to /health from access log (noisy)
    log_format              main '$remote_addr - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent" '
                               'rt=$request_time urt=$upstream_response_time';
    access_log              /var/log/nginx/access.log main;

    # Compression
    gzip                    on;
    gzip_vary               on;
    gzip_proxied            any;
    gzip_comp_level         5;
    gzip_min_length         1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # Rate-limit & connection-limit zones (declared in conf.d/rate-limit.conf)
    include /etc/nginx/conf.d/*.conf;
}
