# ----------------------------------------------------------------------
# TLS hardening — Mozilla "intermediate" profile.
# Covers TLS 1.2 / 1.3, modern cipher suites, OCSP stapling.
# ----------------------------------------------------------------------

ssl_protocols              TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers  on;
ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_ecdh_curve             X25519:secp384r1;
ssl_session_cache          shared:SSL:10m;
ssl_session_timeout        1d;
ssl_session_tickets        off;

# OCSP stapling (must be on if behind Firewall/CDN; harmless if upstream doesn't support)
ssl_stapling               on;
ssl_stapling_verify        on;

# DNS resolver for OCSP (Cloudflare + Google as fallbacks)
resolver                   1.1.1.1 8.8.8.8 valid=300s ipv6=off;
resolver_timeout           5s;

# Buffer large headers (auth tokens, cookies, JWT) without chunking
ssl_buffer_size            16k;

# DH params (regenerated with `openssl dhparam -out dhparam.pem 4096` ideally)
# A 2048-bit fallback is bundled with the alpine image — sufficient for intermediate profile.
ssl_dhparam                /etc/nginx/dhparam.pem;
