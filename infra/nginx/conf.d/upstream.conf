# ----------------------------------------------------------------------
# Upstream pools — services reachable via the Docker internal network.
# Service names match the `container_name` / `service` in docker-compose.yml.
# ----------------------------------------------------------------------

upstream app_backend {
    # Rust + Actix-Web API
    server backend:8080 max_fails=3 fail_timeout=30s;
    keepalive           32;
    keepalive_timeout   60s;
    keepalive_requests  1000;
}

upstream app_frontend {
    # Nuxt 4 SSR
    server frontend:3000 max_fails=3 fail_timeout=30s;
    keepalive           16;
    keepalive_timeout   60s;
    keepalive_requests  1000;
}

upstream app_ws {
    # WebSocket endpoint (long-lived connections, disable proxy buffering)
    server backend:8080 max_fails=3 fail_timeout=30s;
}
