# ----------------------------------------------------------------------
# Security headers + reverse proxy base settings.
# Headers are added INSIDE the main `server` block via the `add_header`
# directives declared here (they apply globally as a default).
# ----------------------------------------------------------------------

# Strip server signature. (server_tokens is set in main nginx.conf)
# Note: X-Powered-By removal requires either the `headers-more` module
# (not bundled with nginx:alpine) or app-level config to avoid sending it.
# Production deployments using custom nginx builds can add `more_clear_headers
# Server X-Powered-By;` here.

# Generic safety headers (applied via `add_header` in `server` blocks below).
# These are declared here so a missing block doesn't accidentally omit them.
add_header X-Frame-Options             "SAMEORIGIN"                always;
add_header X-Content-Type-Options      "nosniff"                   always;
add_header X-XSS-Protection            "1; mode=block"             always;
add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy  "same-origin"               always;
add_header Cross-Origin-Resource-Policy "same-site"                always;

# HSTS: opt-in via env var. Production should turn this on.
# 31536000s = 1 year. `preload` requires submission to hstspreload.org.
map $http_x_forwarded_proto $hsts_header {
    "https" "max-age=31536000; includeSubDomains; preload";
    default "";
}
add_header Strict-Transport-Security   $hsts_header                always;
