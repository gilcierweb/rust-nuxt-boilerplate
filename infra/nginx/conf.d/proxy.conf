# ----------------------------------------------------------------------
# Reusable proxy directive fragments.
# Used inside `server { location { } }` blocks via `include`.
# ----------------------------------------------------------------------

# WebSocket upgrade support
proxy_http_version      1.1;
proxy_set_header        Upgrade            $http_upgrade;
proxy_set_header        Connection         "upgrade";

# Pass real client info to the upstream
proxy_set_header        Host               $host;
proxy_set_header        X-Real-IP          $remote_addr;
proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header        X-Forwarded-Proto  $scheme;
proxy_set_header        X-Forwarded-Host   $host;
proxy_set_header        X-Forwarded-Port   $server_port;
proxy_set_header        X-Request-ID       $request_id;

# Strip the hop-by-hop headers nginx already adds / trusts upstream to set
proxy_redirect          off;
# proxy_buffering and proxy_request_buffering declared in main nginx.conf to keep these settings consistent.
