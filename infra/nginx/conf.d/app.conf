# ----------------------------------------------------------------------
# APP server block — production-ready reverse proxy + TLS terminator.
#
# Adjust `server_name` to your domain. The default value `localhost _;`
# matches requests without a specific Host header (useful for the load
# balancer / health check).
# ----------------------------------------------------------------------

# ---- HTTP (port 80) — force redirect to HTTPS ----
server {
    listen          80 default_server;
    listen          [::]:80 default_server;
    server_name     _;

    # ACME http-01 challenge (Let's Encrypt)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HSTS hint even on the HTTP response (helps with client first-contact)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS (port 443) — main TLS terminator + reverse proxy ----
server {
    listen          443 ssl;
    listen          [::]:443 ssl;
    http2           on;
    server_name     _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Trust TLS-terminated reverse proxies (e.g. Cloudflare) — adjust list per env.
    set_real_ip_from    10.0.0.0/8;
    set_real_ip_from    172.16.0.0/12;
    set_real_ip_from    192.168.0.0/16;
    set_real_ip_from    127.0.0.1;
    real_ip_header      X-Forwarded-For;
    real_ip_recursive   on;

    # ------------------------------------------------------------------
    # Public site — Nuxt SSR (marketing pages, /auth/*, /portal/*, /admin/*)
    # ------------------------------------------------------------------
    location / {
        limit_req zone=per_ip burst=50 nodelay;
        limit_conn conn_per_ip 20;

        proxy_pass          http://app_frontend;
        include             /etc/nginx/conf.d/proxy.conf;
    }

    # ------------------------------------------------------------------
    # API — Rust + Actix-Web
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_ip burst=20 nodelay;
        limit_conn conn_per_ip 30;

        proxy_pass          http://app_backend;
        include             /etc/nginx/conf.d/proxy.conf;
    }

    # Auth flow — stricter rate limit (protects login/register/reset endpoints
    # which the backend also rate-limits, but edge-limiting cuts volumetric).
    location ~ ^/api/v1/auth/(login|register|recover|reset|confirm)(/|$) {
        limit_req zone=auth_ip burst=10 nodelay;
        limit_conn conn_per_ip 5;

        proxy_pass          http://app_backend;
        include             /etc/nginx/conf.d/proxy.conf;
    }

    # ------------------------------------------------------------------
    # WebSocket — long-lived connections (no proxy buffering)
    # ------------------------------------------------------------------
    location /api/v1/ws {
        proxy_pass          http://app_ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";

        # WebSocket-specific timeouts (no request timeout)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ------------------------------------------------------------------
    # Health checks — bypass limit zones
    # ------------------------------------------------------------------
    location = /health {
        access_log off;
        proxy_pass          http://app_backend/health;
        include             /etc/nginx/conf.d/proxy.conf;
    }
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
