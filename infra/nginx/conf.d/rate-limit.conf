# ----------------------------------------------------------------------
# Rate limiting zones — first line of defense at the edge.
# Backend (Actix-Web + Redis) enforces application-aware limits; these
# nginx zones provide a coarse-grained perimeter defense against
# volumetric attacks / scrapers.
#
# `limit_req` uses leaky-bucket: burst tokens fill, refilled at `rate`.
# Requests beyond the burst are returned 429 Too Many Requests.
# ----------------------------------------------------------------------

# Per-IP zone shared across all virtual hosts. 16m buckets allow 16MB RAM.
limit_req_zone  $binary_remote_addr  zone=per_ip:16m  rate=30r/s;
limit_req_zone  $binary_remote_addr  zone=auth_ip:16m  rate=5r/s;       # Strict auth area
limit_req_zone  $binary_remote_addr  zone=api_ip:16m   rate=60r/m;     # API general: 60 per minute
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Standard response when a zone trips
limit_req_status    429;
limit_conn_status   429;

# Default burst limits
limit_req           zone=per_ip burst=50 nodelay;
