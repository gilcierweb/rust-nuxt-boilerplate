name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install sccache
        uses: actions-rs/sccache@v2
        with:
          version: "v0.9.0"

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit (security check)
        run: cargo audit
        continue-on-error: false

      - name: Install diesel_cli
        run: cargo install diesel_cli --no-default-features --features postgres

      - name: Run diesel migrations
        run: diesel migration run --database-url postgres://postgres:postgres@localhost:5432/test_db

      - name: Run cargo fmt (check formatting)
        run: cargo fmt --all -- --check

      - name: Run cargo clippy (linting)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Unit tests: file-based, no DB, parallel
      - name: Run unit tests (parallel, no DB)
        run: |
          cargo test --lib --bins \
            --test api_version_integration \
            --test csrf_protection_integration \
            --test migration_rollback \
            -- --test-threads=4 --skip live_migration_rollback_cycle
        env:
          REDIS_URL: redis://localhost:6379

      # Integration tests: need DB, sequential
      - name: Run integration tests (sequential, with DB)
        run: |
          cargo test --test auth_integration \
            --test migration_rollback \
            -- --test-threads=1 live_migration_rollback_cycle
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (dependency security check)
        run: pnpm audit --prod
        continue-on-error: false

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run lint
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test:unit
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit with JSON output
        run: cargo audit --json > audit-report.json || true
        working-directory: ./backend

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: backend/audit-report.json
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: |
          if cargo audit 2>&1 | grep -q "vulnerabilities found"; then
            echo "::error::Security vulnerabilities detected!"
            exit 1
          fi
        working-directory: ./backend