name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        shell: bash
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry, git, and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('backend/Cargo.lock') }}

      - name: Cache diesel_cli binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/diesel
          key: ${{ runner.os }}-diesel-cli-${{ hashFiles('backend/Cargo.lock') }}

      - name: Install cargo-audit (cached)
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit
          fi

      - name: Run cargo audit (security check)
        run: cargo audit

      - name: Install diesel_cli (cached)
        run: |
          if ! command -v diesel &> /dev/null; then
            cargo install diesel_cli --no-default-features --features postgres
          fi

      # Migration rollback test runs FIRST on clean DB (tests full up→down→up cycle)
      - name: Run migration rollback test (clean DB)
        run: cargo test --test migration_rollback live_migration_rollback_cycle -- --test-threads=1
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      # Apply migrations for other integration tests
      - name: Run diesel migrations
        run: diesel migration run --database-url postgres://postgres:postgres@localhost:5432/test_db

      - name: Run cargo fmt (check formatting)
        run: cargo fmt --all -- --check

      - name: Run cargo clippy (linting)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Unit tests: file-based, no DB, parallel
      - name: Run unit tests (parallel, no DB)
        run: |
          cargo test --lib --bins \
            --test api_version_integration \
            --test csrf_protection_integration \
            --test migration_rollback \
            -- --test-threads=4 --skip live_migration_rollback_cycle
        env:
          REDIS_URL: redis://localhost:6379

      # Integration tests: need DB, sequential (migrations already applied)
      - name: Run integration tests (sequential, with DB)
        run: |
          cargo test --test auth_integration -- --test-threads=1
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (dependency security check)
        run: pnpm audit --prod
        continue-on-error: false

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run lint
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test:unit
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit
          fi

      - name: Run cargo audit with JSON output
        run: cargo audit --json > audit-report.json || true
        working-directory: ./backend

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: backend/audit-report.json
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: |
          if cargo audit 2>&1 | grep -q "vulnerabilities found"; then
            echo "::error::Security vulnerabilities detected!"
            exit 1
          fi
        working-directory: ./backend