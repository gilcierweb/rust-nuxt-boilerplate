name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: backend-build
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build backend binary
        run: cargo build --bin backend

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/target/debug/backend
          retention-days: 1

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-backend]
    defaults:
      run:
        working-directory: ./backend
        shell: bash
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: backend-build
          save-if: false

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: backend/target/debug

      - name: Make binary executable
        run: chmod +x ${{ github.workspace }}/backend/target/debug/backend

      - name: Install diesel_cli (pre-built binary)
        shell: bash
        run: |
          set -euo pipefail
          DIESEL_VERSION="v2.3.11"
          ASSET="diesel_cli-x86_64-unknown-linux-gnu.tar.xz"
          INSTALL_DIR="$HOME/.cargo/bin"
          mkdir -p "$INSTALL_DIR"
          if command -v diesel &> /dev/null && diesel --version | grep -q "$DIESEL_VERSION"; then
            echo "diesel already installed, skipping"
            exit 0
          fi
          echo "Downloading diesel_cli $DIESEL_VERSION (pre-built binary)..."
          TMPDIR="$(mktemp -d)"
          curl -fsSL "https://github.com/diesel-rs/diesel/releases/download/${DIESEL_VERSION}/${ASSET}" \
            -o "$TMPDIR/${ASSET}"
          curl -fsSL "https://github.com/diesel-rs/diesel/releases/download/${DIESEL_VERSION}/${ASSET}.sha256" \
            -o "$TMPDIR/${ASSET}.sha256"
          (cd "$TMPDIR" && sha256sum -c "${ASSET}.sha256")
          tar -xJf "$TMPDIR/${ASSET}" -C "$TMPDIR"
          install -m 0755 "$TMPDIR/diesel_cli-x86_64-unknown-linux-gnu/diesel" "$INSTALL_DIR/diesel"
          rm -rf "$TMPDIR"
          diesel --version

      - name: Run cargo fmt (check formatting)
        run: cargo fmt --all -- --check

      - name: Run cargo clippy (linting)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run migration rollback test (clean DB)
        run: cargo test --test migration_rollback live_migration_rollback_cycle -- --test-threads=1
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Reset database schema after rollback test
        run: psql postgres://postgres:postgres@localhost:5432/test_db -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

      - name: Run diesel migrations
        run: diesel migration run --database-url postgres://postgres:postgres@localhost:5432/test_db

      - name: Run unit tests (parallel, no DB)
        run: |
          cargo test --lib --bins \
            --test api_version_integration \
            --test csrf_protection_integration \
            --test migration_rollback \
            -- --test-threads=4 --skip live_migration_rollback_cycle
        env:
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests (sequential, with DB)
        run: |
          cargo test --test auth_integration -- --test-threads=1
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run lint
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm test -- --run --passWithNoTests

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-backend, frontend-test]
    defaults:
      run:
        working-directory: ./frontend
        shell: bash
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: backend/target/debug

      - name: Make binary executable
        run: chmod +x ${{ github.workspace }}/backend/target/debug/backend

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install diesel_cli (pre-built binary)
        shell: bash
        run: |
          set -euo pipefail
          DIESEL_VERSION="v2.3.11"
          ASSET="diesel_cli-x86_64-unknown-linux-gnu.tar.xz"
          INSTALL_DIR="$HOME/.cargo/bin"
          mkdir -p "$INSTALL_DIR"
          if command -v diesel &> /dev/null && diesel --version | grep -q "$DIESEL_VERSION"; then
            echo "diesel already installed, skipping"
            exit 0
          fi
          echo "Downloading diesel_cli $DIESEL_VERSION (pre-built binary)..."
          TMPDIR="$(mktemp -d)"
          curl -fsSL "https://github.com/diesel-rs/diesel/releases/download/${DIESEL_VERSION}/${ASSET}" \
            -o "$TMPDIR/${ASSET}"
          curl -fsSL "https://github.com/diesel-rs/diesel/releases/download/${DIESEL_VERSION}/${ASSET}.sha256" \
            -o "$TMPDIR/${ASSET}.sha256"
          (cd "$TMPDIR" && sha256sum -c "${ASSET}.sha256")
          tar -xJf "$TMPDIR/${ASSET}" -C "$TMPDIR"
          install -m 0755 "$TMPDIR/diesel_cli-x86_64-unknown-linux-gnu/diesel" "$INSTALL_DIR/diesel"
          rm -rf "$TMPDIR"
          diesel --version

      - name: Run diesel migrations
        run: diesel migration run --database-url postgres://postgres:postgres@localhost:5432/test_db
        working-directory: ./backend

      - name: Start backend server
        run: |
          ${{ github.workspace }}/backend/target/debug/backend &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          sleep 5
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: "test-jwt-secret-key-for-integration-tests-32b!"
          MASTER_KEY: "dGVzdC1tYXN0ZXIta2V5LWZvci11bml0LXRlc3Rz"
          BLIND_INDEX_KEY: "dGVzdC1ibGluZC1pbmRleC1rZXktZm9yLXRlc3Rz"
          FRONTEND_URL: "http://localhost:3000"
          ENVIRONMENT: "Test"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop backend server
        if: always()
        run: |
          if [ -n "$BACKEND_PID" ]; then
            kill $BACKEND_PID || true
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend-test, frontend-test, frontend-e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (push gate)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
