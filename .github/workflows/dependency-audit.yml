name: Dependency Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday 2 AM UTC

jobs:
  cargo-audit:
    name: Rust Dependency Audit (cargo-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ./backend/target/
            ./frontend/node_modules/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-audit
        uses: actions-rs/install@v0.1
        with:
          crate: cargo-audit
          version: latest
          use-tool-cache: true

      - name: Run cargo audit
        run: cargo audit

  pnpm-audit:
    name: Node.js Dependency Audit (pnpm-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --prod --audit-level=moderate

  summary:
    name: Audit Summary
    runs-on: ubuntu-latest
    needs: [cargo-audit, pnpm-audit]
    if: always()
    steps:
      - name: Check audit results
        run: |
          if [ "${{ needs.cargo-audit.result }}" != "success" ]; then
            echo "::error::Rust dependency audit failed"
            exit 1
          fi
          if [ "${{ needs.pnpm-audit.result }}" != "success" ]; then
            echo "::error::Node.js dependency audit failed"
            exit 1
          fi
          echo "All dependency audits passed"