name: Migration Rollback Test

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  migration-rollback:
    name: Migration Rollback Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install diesel_cli
        run: cargo install diesel_cli --no-default-features --features postgres

      - name: Run migration rollback test (script)
        run: |
          chmod +x ../scripts/test_migration_rollback.sh
          ../scripts/test_migration_rollback.sh postgres://postgres:postgres@localhost:5432/test_db
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

      - name: Run live_migration_rollback_cycle test (cargo test)
        run: cargo test --test migration_rollback live_migration_rollback_cycle -- --test-threads=1
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/test_db