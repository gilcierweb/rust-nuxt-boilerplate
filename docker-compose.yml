version: "3.9"

# -- rust_nuxt_boilerplate Platform - Docker Compose
# Development: docker compose up
# Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
#
# Secrets (SECURITY_AUDIT.md I3):
#   - In dev: env_file: .env provides values directly as env vars.
#   - In production: secrets are mounted from infra/secrets/*.txt files at
#     /run/secrets/ inside the container. Application code reads them via
#     `client/src/config/secrets.rs` which prefers /run/secrets/<NAME> and
#     falls back to env vars. Critical secrets (POSTGRES_PASSWORD, JWT_SECRET,
#     MASTER_ENCRYPTION_KEY, BLIND_INDEX_KEY, CSRF_SECRET_KEY,
#     REFRESH_TOKEN_HASH_SALT) MUST be provided as Docker secrets in production.
#
#   To rotate: replace the file in infra/secrets/ — no rebuild required
#   (`docker compose up -d` reads the file at startup, but only the backend
#   needs to be restarted to pick up the change).

services:

  # -- PostgreSQL
  # Internal service. In production (no override file loaded), postgres is NOT
  # exposed on the host — only reachable via the `rust_nuxt_boilerplate_net`
  # Docker network on port 5432. For local development, use
  # `docker-compose.override.yml` which adds host port mappings.
  # See SECURITY_AUDIT.md I1.
  postgres:
    image: postgres:16-alpine
    container_name: rust_nuxt_boilerplate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rust_nuxt_boilerplate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rust_nuxt_boilerplate_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    # NO host port mapping by default. Override file (dev only) adds it.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rust_nuxt_boilerplate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rust_nuxt_boilerplate_net

  # -- Redis
  # Internal service. See postgres note above. SECURITY_AUDIT.md I1.
  redis:
    image: redis:7-alpine
    container_name: rust_nuxt_boilerplate_redis
    restart: unless-stopped
    # - maxmemory 2gb: Redis is used for rate limiting + caching + sessions +
    #   token blacklisting + WS pub/sub. 512MB was insufficient under load.
    # - volatile-lru: Evict only keys with TTL set. Critical for rate limit keys
    #   which MUST persist for the full window — using allkeys-lru previously
    #   caused rate limit keys to be evicted mid-window, leading to rate limit
    #   failure (see SECURITY_AUDIT.md P7 / S3).
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy volatile-lru
      --save 60 1000
    volumes:
      - redis_data:/data
    # NO host port mapping by default. Override file (dev only) adds it.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rust_nuxt_boilerplate_net

  # -- Backend (Rust / Actix-Web)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: rust_nuxt_boilerplate_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rust_nuxt_boilerplate}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rust_nuxt_boilerplate_dev}
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src:ro  # hot reload in dev via cargo-watch
    # Critical secrets mounted as files in /run/secrets/. The backend's
    # `src/config/secrets.rs` reads from /run/secrets/<name> first, then
    # falls back to env vars. In production, populate infra/secrets/*.txt
    # with real values (see infra/secrets/README.md). In dev, placeholders
    # are fine because env_file: .env provides the working values.
    secrets:
      - postgres_password
      - jwt_secret
      - master_encryption_key
      - blind_index_key
      - csrf_secret_key
      - refresh_token_hash_salt
      - resend_api_key
      - stripe_secret_key
      - stripe_webhook_secret
    # `DOCKER_SECRETS_ENABLED=1` tells the app to prefer /run/secrets over env vars.
    # Set this in production; leave unset in dev to keep env_file precedence.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rust_nuxt_boilerplate_net

  # -- Frontend (Nuxt.js) 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: rust_nuxt_boilerplate_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NUXT_PUBLIC_API_BASE: http://backend:8080/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    depends_on:
      - backend
    networks:
      - rust_nuxt_boilerplate_net

  # -- Nginx (Reverse Proxy) 
  nginx:
    image: nginx:alpine
    container_name: rust_nuxt_boilerplate_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      # DH params — required for DHE-* cipher suites. Generate with:
      #   openssl dhparam -out infra/ssl/dhparam.pem 2048
      # See infra/README.md.
      - ./infra/ssl/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - rust_nuxt_boilerplate_net

  # -- MeiliSearch
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: rust_nuxt_boilerplate_search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}
      MEILI_ENV: ${ENVIRONMENT:-development}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - rust_nuxt_boilerplate_net

  # -- Portainer (Container Management UI)
  # SECURITY_AUDIT.md I4: Portainer requires `/var/run/docker.sock` which
  # gives the container FULL root access to the host. This is acceptable
  # for local development behind a firewall, but MUST NOT be deployed in
  # production. Portainer is gated behind the `dev-tools` profile:
  #
  #   # Dev only:
  #   docker compose --profile dev-tools up
  #
  #   # Production: omit portainer entirely (default `docker compose up`)
  #
  # For production container management, consider:
  #   - Host-side: lazydocker, ctop, sysdig, or kubectl (for k8s)
  #   - Remote Portainer Agent: run portainer-agent on a dedicated host
  #     and point it at remote Docker daemons via TCP+TLS (no socket mount)
  portainer:
    profiles: ["dev-tools"]
    image: portainer/portainer-ce:latest
    container_name: rust_nuxt_boilerplate_portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      # WARNING: This mount gives Portainer complete control over the
      # Docker daemon — equivalent to root on the host. Acceptable for
      # local dev only (gated by profile above).
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - rust_nuxt_boilerplate_net

  # -- Prometheus 
  prometheus:
    image: prom/prometheus:latest
    container_name: rust_nuxt_boilerplate_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - rust_nuxt_boilerplate_net

  # -- Grafana 
  grafana:
    image: grafana/grafana:latest
    container_name: rust_nuxt_boilerplate_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - rust_nuxt_boilerplate_net

# -- Volumes
volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  portainer_data:
  prometheus_data:
  grafana_data:
  nginx_logs:

# -- Docker secrets (SECURITY_AUDIT.md I3)
# Each file in infra/secrets/ becomes /run/secrets/<name> in the backend container.
# Source files are gitignored. In development you can leave them as placeholders;
# env_file: .env provides fallback values for non-critical config.
secrets:
  postgres_password:
    file: ./infra/secrets/postgres_password.txt
  jwt_secret:
    file: ./infra/secrets/jwt_secret.txt
  master_encryption_key:
    file: ./infra/secrets/master_encryption_key.txt
  blind_index_key:
    file: ./infra/secrets/blind_index_key.txt
  csrf_secret_key:
    file: ./infra/secrets/csrf_secret_key.txt
  refresh_token_hash_salt:
    file: ./infra/secrets/refresh_token_hash_salt.txt
  resend_api_key:
    file: ./infra/secrets/resend_api_key.txt
  stripe_secret_key:
    file: ./infra/secrets/stripe_secret_key.txt
  stripe_webhook_secret:
    file: ./infra/secrets/stripe_webhook_secret.txt

# -- Networks 
networks:
  rust_nuxt_boilerplate_net:
    driver: bridge
