version: "3.9"

# -- rust_nuxt_boilerplate Platform - Docker Compose 
# Development: docker compose up
# Production:  docker compose --env-file .env.production up -d

services:

  # -- PostgreSQL
  # Internal service. In production (no override file loaded), postgres is NOT
  # exposed on the host — only reachable via the `rust_nuxt_boilerplate_net`
  # Docker network on port 5432. For local development, use
  # `docker-compose.override.yml` which adds host port mappings.
  # See SECURITY_AUDIT.md I1.
  postgres:
    image: postgres:16-alpine
    container_name: rust_nuxt_boilerplate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rust_nuxt_boilerplate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rust_nuxt_boilerplate_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    # NO host port mapping by default. Override file (dev only) adds it.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rust_nuxt_boilerplate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rust_nuxt_boilerplate_net

  # -- Redis
  # Internal service. See postgres note above. SECURITY_AUDIT.md I1.
  redis:
    image: redis:7-alpine
    container_name: rust_nuxt_boilerplate_redis
    restart: unless-stopped
    # - maxmemory 2gb: Redis is used for rate limiting + caching + sessions +
    #   token blacklisting + WS pub/sub. 512MB was insufficient under load.
    # - volatile-lru: Evict only keys with TTL set. Critical for rate limit keys
    #   which MUST persist for the full window — using allkeys-lru previously
    #   caused rate limit keys to be evicted mid-window, leading to rate limit
    #   failure (see SECURITY_AUDIT.md P7 / S3).
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy volatile-lru
      --save 60 1000
    volumes:
      - redis_data:/data
    # NO host port mapping by default. Override file (dev only) adds it.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rust_nuxt_boilerplate_net

  # -- Backend (Rust / Actix-Web) 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: rust_nuxt_boilerplate_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rust_nuxt_boilerplate}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rust_nuxt_boilerplate_dev}
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src:ro  # hot reload in dev via cargo-watch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rust_nuxt_boilerplate_net

  # -- Frontend (Nuxt.js) 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: rust_nuxt_boilerplate_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NUXT_PUBLIC_API_BASE: http://backend:8080/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    depends_on:
      - backend
    networks:
      - rust_nuxt_boilerplate_net

  # -- Nginx (Reverse Proxy) 
  nginx:
    image: nginx:alpine
    container_name: rust_nuxt_boilerplate_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - rust_nuxt_boilerplate_net

  # -- MeiliSearch 
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: rust_nuxt_boilerplate_search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}
      MEILI_ENV: ${ENVIRONMENT:-development}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - rust_nuxt_boilerplate_net

  # -- Portainer (Container Management UI) 
  portainer:
    image: portainer/portainer-ce:latest
    container_name: rust_nuxt_boilerplate_portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - rust_nuxt_boilerplate_net

  # -- Prometheus 
  prometheus:
    image: prom/prometheus:latest
    container_name: rust_nuxt_boilerplate_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - rust_nuxt_boilerplate_net

  # -- Grafana 
  grafana:
    image: grafana/grafana:latest
    container_name: rust_nuxt_boilerplate_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - rust_nuxt_boilerplate_net

# -- Volumes 
volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  portainer_data:
  prometheus_data:
  grafana_data:
  nginx_logs:

# -- Networks 
networks:
  rust_nuxt_boilerplate_net:
    driver: bridge
